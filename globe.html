<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum Startups Globe</title>
  <script src="https://unpkg.com/globe.gl"></script>
  <style>
    :root {
      --bg: #06131f;
      --panel: #0d2233;
      --text: #e8f1ff;
      --muted: #9bb3cc;
      --accent: #00c2a8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at 20% 10%, #12324a 0%, var(--bg) 50%, #03080f 100%);
      color: var(--text);
    }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
    }
    .panel {
      background: rgba(9, 25, 40, 0.92);
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
      overflow: auto;
    }
    .panel h1 {
      font-size: 18px;
      margin: 0 0 8px;
      line-height: 1.3;
    }
    .panel p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .control {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    select, input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0f2a3e;
      color: var(--text);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .toggle-row label {
      margin: 0;
    }
    .toggle-row input[type="checkbox"] {
      width: auto;
      transform: scale(1.1);
      accent-color: var(--accent);
      cursor: pointer;
    }
    .stats {
      margin-top: 14px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      font-size: 13px;
    }
    .section-title {
      margin: 14px 0 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .stats small {
      color: var(--muted);
    }
    .metro-map {
      width: 100%;
      height: 220px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: linear-gradient(180deg, #0d2336 0%, #0a1b2b 100%);
      overflow: hidden;
      position: relative;
    }
    .metro-map svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .metro-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 10px;
    }
    .metro-note {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .metro-actions {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .metro-actions button {
      border: 1px solid rgba(255,255,255,0.22);
      background: #11334b;
      color: var(--text);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
    }
    .metro-actions button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .metro-selection {
      font-size: 11px;
      color: var(--muted);
    }
    .inline-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .inline-actions button {
      border: 1px solid rgba(255,255,255,0.22);
      background: #11334b;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      cursor: pointer;
      flex: 1;
    }
    .network-svg {
      width: 100%;
      height: 170px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: linear-gradient(180deg, #0d2336 0%, #0a1b2b 100%);
      margin-top: 6px;
      display: block;
    }
    .legend {
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
    }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    #globe { width: 100%; height: 100vh; }
    .tooltip {
      font-size: 12px;
      line-height: 1.45;
      max-width: 260px;
    }
    .tooltip b { color: #fff; }
    .footer-link { margin-top: 12px; font-size: 12px; }
    .footer-link a { color: var(--accent); text-decoration: none; }
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 300px 1fr; }
      .panel { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
      #globe { height: calc(100vh - 300px); }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>Quantum Startups Globe</h1>
      <p>Interactive map of 100 startups with region/specialty filters.</p>

      <div class="control">
        <label for="regionFilter">Region</label>
        <select id="regionFilter">
          <option value="all">All Regions</option>
        </select>
      </div>

      <div class="control">
        <label for="specialtyFilter">Specialty</label>
        <select id="specialtyFilter">
          <option value="all">All Specialties</option>
        </select>
      </div>

      <div class="control">
        <label for="searchInput">Search Startup</label>
        <input id="searchInput" type="text" placeholder="Type company name" />
      </div>

      <div class="control">
        <label for="lifecycleFilter">Lifecycle</label>
        <select id="lifecycleFilter">
          <option value="all">All Lifecycle Stages</option>
        </select>
      </div>

      <div class="control">
        <label for="maturityFilter">Go-To-Market Maturity</label>
        <select id="maturityFilter">
          <option value="all">All Maturity Stages</option>
        </select>
      </div>

      <div class="section-title">Saved Views</div>
      <div class="control">
        <label for="viewNameInput">View Name</label>
        <input id="viewNameInput" type="text" placeholder="e.g. Europe hardware focus" />
      </div>
      <div class="inline-actions">
        <button id="saveViewBtn" type="button">Save View</button>
        <button id="copyLinkBtn" type="button">Copy Share Link</button>
      </div>
      <div class="control">
        <label for="savedViewsSelect">Load Saved View</label>
        <select id="savedViewsSelect">
          <option value="">Select a saved view</option>
        </select>
      </div>

      <div class="toggle-row">
        <label for="drillDownToggle">Regional Drill-Down Mode</label>
        <input id="drillDownToggle" type="checkbox" checked />
      </div>

      <div class="stats" id="stats"></div>
      <div class="section-title">Regional Drill-Down</div>
      <div class="stats" id="drilldownStats"></div>

      <div class="section-title">Country Comparison</div>
      <div class="comparison-grid">
        <select id="compareCountryA"></select>
        <select id="compareCountryB"></select>
      </div>
      <div class="stats" id="comparisonCard"></div>

      <div class="section-title">2D Metro Drill-Down</div>
      <div class="control">
        <label for="metroHubSelect">Dense Hub</label>
        <select id="metroHubSelect"></select>
      </div>
      <div class="metro-map" id="metroMap"></div>
      <div class="metro-note" id="metroNote"></div>
      <div class="metro-actions">
        <button id="clearMetroSelection" type="button" disabled>Clear Cluster Filter</button>
        <div class="metro-selection" id="metroSelectionState"></div>
      </div>

      <div class="section-title">Partnership Network</div>
      <div class="stats" id="partnershipCard"></div>
      <svg class="network-svg" id="partnershipGraph" viewBox="0 0 280 170" role="img" aria-label="Partnership network graph"></svg>

      <div class="section-title">Data Quality</div>
      <div class="stats" id="qualityCard"></div>

      <div class="legend">
      <div><span class="dot" style="background:#dfff00"></span>Hardware</div>
        <div><span class="dot" style="background:#52a7ff"></span>Software</div>
        <div><span class="dot" style="background:#f9a826"></span>Cryptography</div>
        <div><span class="dot" style="background:#ef5da8"></span>Sensing</div>
        <div><span class="dot" style="background:#c5e55a"></span>Materials / Other</div>
      </div>

      <div class="footer-link"><a href="index.html">Back to report index</a></div>
    </aside>
    <div id="globe"></div>
  </div>

    async function loadCountryBorders() {
      const topoJson = await import('https://cdn.jsdelivr.net/npm/topojson-client@3/+esm');
      const res = await fetch(COUNTRIES_GEOJSON_URL);
      const topology = await res.json();
      const countries = topoJson.feature(topology, topology.objects.countries);

      world
        .polygonsData(countries.features)
        .polygonCapColor(() => 'rgba(0, 0, 0, 0)')
        .polygonSideColor(() => 'rgba(0, 0, 0, 0)')
        .polygonStrokeColor(() => BORDER_COLOR)
        .polygonAltitude(0.0012)
        .polygonsTransitionDuration(0)

          hoveredPolygonRegion = countryToRegion[normalizeCountryName(countryName)] || null;
          syncHoverState();
        });
    }

    function normalizeCountryName(name) {

    function hexToRgba(hexColor, alpha) {
      const hex = String(hexColor || '').replace('#', '');
      if (hex.length !== 6) return hexColor;
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

      const hoveredRegion = currentHoveredRegion();
      if (hoveredRegion) return hoveredRegion;
      if (drillDownToggle.checked && regionFilter.value !== 'all') return regionFilter.value;
      return null;
    }

    function focusRegion(region) {
      const target = CONTINENT_VIEWS[region];
      if (!target || focusedRegion === region) return;
      if (!focusedRegion) {
        previousPointOfView = world.pointOfView();
      }
      focusedRegion = region;
      world.pointOfView(target, 850);
    }

    function clearRegionFocus() {
      if (!focusedRegion) return;
      focusedRegion = null;
      if (previousPointOfView) {
        world.pointOfView(previousPointOfView, 850);
        previousPointOfView = null;
      }
    }

    function updatePointEmphasis() {
      const activeRegion = currentActiveRegion();
      const hasActiveRegion = Boolean(activeRegion);
      world
        .pointAltitude(d => (
          hasActiveRegion && d.region === activeRegion
            ? POINT_VISUALS.focusAltitude
            : POINT_VISUALS.baseAltitude
        ))
        .pointRadius(d => (
          hasActiveRegion && d.region === activeRegion
            ? POINT_VISUALS.focusRadius
            : POINT_VISUALS.baseRadius
        ))
        .pointColor(d => {
          if (!hasActiveRegion || d.region === activeRegion) return d.color;
          return hexToRgba(d.color, 0.25);
        });
    }

    function syncHoverState() {
      const activeRegion = currentActiveRegion();
      world.controls().autoRotate = !activeRegion && !pointerInsideGlobe;
      // Disable continent auto-zoom on hover/selection to avoid interaction glitches.
      updatePointEmphasis();
      updateDrilldownPanels();
    }

    function sortByCountThenName(entries) {
      return entries.sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
    }

    function aggregateCountryStats(data) {
      const countryMap = new Map();
      data.forEach(s => {
        if (!countryMap.has(s.country)) {
          countryMap.set(s.country, {
            name: s.country,
            count: 0,
            specialties: {},
            fundingKnown: 0,
            foundedKnown: 0,
            recentFounded: 0,
            foundedYears: []
          });
        }
        const row = countryMap.get(s.country);
        row.count += 1;
        s.specialty.forEach(sp => {
          row.specialties[sp] = (row.specialties[sp] || 0) + 1;
        });
        if (s.funding && s.funding !== 'Undisclosed') {
          row.fundingKnown += 1;
        }
        if (Number.isInteger(s.founded_year)) {
          row.foundedKnown += 1;
          row.foundedYears.push(s.founded_year);
          if (s.founded_year >= 2020) {
            row.recentFounded += 1;
          }
        }
      });
      return sortByCountThenName(Array.from(countryMap.values()));
    }

    function topSpecialtiesLabel(specialtyMap) {
      return Object.entries(specialtyMap)
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .slice(0, 2)
        .map(([name]) => name)
        .join(', ') || 'n/a';
    }

    function setCountryOptions(options) {
      const previousA = compareCountryA.value;
      const previousB = compareCountryB.value;
      compareCountryA.innerHTML = '';
      compareCountryB.innerHTML = '';

      options.forEach(country => {
        const aOpt = document.createElement('option');
        aOpt.value = country;
        aOpt.textContent = country;
        compareCountryA.appendChild(aOpt);

        const bOpt = document.createElement('option');
        bOpt.value = country;
        bOpt.textContent = country;
        compareCountryB.appendChild(bOpt);
      });

      if (!options.length) return;

      compareCountryA.value = options.includes(previousA) ? previousA : options[0];
      const fallbackB = options[1] || options[0];
      compareCountryB.value = options.includes(previousB) && previousB !== compareCountryA.value
        ? previousB
        : fallbackB;
    }

    function medianYear(years) {
      if (!years.length) return null;
      const sorted = [...years].sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      if (sorted.length % 2 === 1) return sorted[mid];
      return Math.round((sorted[mid - 1] + sorted[mid]) / 2);
    }

    function foundedYearFromStartup(s) {
      if (Number.isInteger(s.founded_year)) return s.founded_year;
      const profile = String(s.short_profile || '');
      const match = profile.match(/\bfounded in\s+(\d{4})\b/i);
      return match ? Number(match[1]) : null;
    }

    function lifecycleForStartup(s) {
      const override = lifecycleByCompany[s.name];
      if (override) return override;
      return { status: 'active', effective_date: null, note: '' };
    }

    function maturityForStartup(s) {
      const override = maturityByCompany[s.name];
      if (override) return override;
      const profile = String(s.short_profile || '').toLowerCase();
      if (profile.includes('products') || profile.includes('offers') || profile.includes('commercializing')) {
        return 'production';
      }
      if (profile.includes('research') || profile.includes('aiming to develop')) {
        return 'research';
      }
      if (s.specialty.includes('hardware') && s.specialty.includes('software')) return 'pilot';
      if (s.specialty.includes('hardware') && !s.specialty.includes('software')) return 'research';
      return 'pilot';
    }

    function foundedTrendBuckets(data) {
      const buckets = {
        'Pre-2015': 0,
        '2015-2019': 0,
        '2020+': 0,
        Unknown: 0
      };
      data.forEach(s => {
        const y = s.founded_year;
        if (!Number.isInteger(y)) {
          buckets.Unknown += 1;
        } else if (y < 2015) {
          buckets['Pre-2015'] += 1;
        } else if (y <= 2019) {
          buckets['2015-2019'] += 1;
        } else {
          buckets['2020+'] += 1;
        }
      });
      return buckets;
    }

    function makeStartupId(startup) {
      return `${startup.name}|${startup.city}|${startup.country}`;
    }

    function normalizedName(name) {
      return String(name || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
    }

    function currentCameraState() {
      const pov = world.pointOfView();
      return {
        lat: Number(pov.lat?.toFixed?.(4) || pov.lat || 0),
        lng: Number(pov.lng?.toFixed?.(4) || pov.lng || 0),
        altitude: Number(pov.altitude?.toFixed?.(4) || pov.altitude || 1.8)
      };
    }

    function buildViewState() {
      const ids = metroSelectedStartupIds ? Array.from(metroSelectedStartupIds) : [];
      return {
        region: regionFilter.value,
        specialty: specialtyFilter.value,
        lifecycle: lifecycleFilter.value,
        maturity: maturityFilter.value,
        search: searchInput.value,
        drillDown: drillDownToggle.checked,
        metroHub: metroHubSelect.value,
        metroSelectionIds: ids.slice(0, 50),
        metroSelectionLabel,
        compareA: compareCountryA.value,
        compareB: compareCountryB.value,
        camera: currentCameraState()
      };
    }

    function applyViewState(state) {
      if (!state || typeof state !== 'object') return;
      if (state.region) regionFilter.value = state.region;
      if (state.specialty) specialtyFilter.value = state.specialty;
      if (state.lifecycle) lifecycleFilter.value = state.lifecycle;
      if (state.maturity) maturityFilter.value = state.maturity;
      if (typeof state.search === 'string') searchInput.value = state.search;
      if (typeof state.drillDown === 'boolean') drillDownToggle.checked = state.drillDown;
      if (state.metroHub && METRO_HUBS[state.metroHub]) metroHubSelect.value = state.metroHub;
      if (Array.isArray(state.metroSelectionIds) && state.metroSelectionIds.length) {
        setMetroSelection(state.metroSelectionIds, state.metroSelectionLabel || 'Shared metro cluster');
      } else {
        clearMetroSelectionState();
      }
      suppressUrlSync = true;
      applyFilters();
      suppressUrlSync = false;
      if (state.compareA) compareCountryA.value = state.compareA;
      if (state.compareB) compareCountryB.value = state.compareB;
      if (state.camera && Number.isFinite(state.camera.lat) && Number.isFinite(state.camera.lng) && Number.isFinite(state.camera.altitude)) {
        world.pointOfView(state.camera, 0);
      }
      updateDrilldownPanels();
    }

    function encodeViewState(state) {
      return encodeURIComponent(JSON.stringify(state));
    }

    function decodeViewState(raw) {
      try {
        return JSON.parse(decodeURIComponent(raw));
      } catch (_) {
        return null;
      }
    }

    function syncUrlWithCurrentState() {
      if (suppressUrlSync) return;
      const state = buildViewState();
      const hash = `view=${encodeViewState(state)}`;
      history.replaceState(null, '', `${location.pathname}${location.search}#${hash}`);
    }

    function loadStateFromUrlIfPresent() {
      const hash = String(location.hash || '').replace(/^#/, '');
      if (!hash.startsWith('view=')) return;
      const parsed = decodeViewState(hash.slice(5));
      if (parsed) applyViewState(parsed);
    }

    function loadSavedViews() {
      try {
        return JSON.parse(localStorage.getItem(SAVED_VIEW_STORAGE_KEY) || '[]');
      } catch (_) {
        return [];
      }
    }

    function saveSavedViews(views) {
      localStorage.setItem(SAVED_VIEW_STORAGE_KEY, JSON.stringify(views));
    }

    function renderSavedViewsOptions() {
      const views = loadSavedViews();
      const previous = savedViewsSelect.value;
      savedViewsSelect.innerHTML = '<option value="">Select a saved view</option>';
      views.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.id;
        opt.textContent = v.name;
        savedViewsSelect.appendChild(opt);
      });
      if (previous && views.some(v => v.id === previous)) savedViewsSelect.value = previous;
    }

    function saveCurrentView() {
      const name = viewNameInput.value.trim() || `View ${new Date().toLocaleString()}`;
      const views = loadSavedViews();
      views.unshift({
        id: `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
        name,
        created_at: new Date().toISOString(),
        state: buildViewState()
      });
      saveSavedViews(views.slice(0, 25));
      renderSavedViewsOptions();
    }

    function loadSavedViewById(id) {
      if (!id) return;
      const view = loadSavedViews().find(v => v.id === id);
      if (view?.state) applyViewState(view.state);
    }

    function copyShareLink() {
      syncUrlWithCurrentState();
      const url = location.href;
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(url).catch(() => {});
      }
    }

    function haversineKm(lat1, lng1, lat2, lng2) {
      const toRad = deg => deg * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2
        + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return 6371 * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    function metroCandidates(hub, data) {
      if (hub.country) {
        return data.filter(s => s.country === hub.country);
      }
      return data.filter(s => haversineKm(hub.lat, hub.lng, s.lat, s.lng) <= hub.radiusKm);
    }

    function metroScopeLabel(hub) {
      if (hub.country) return `country = ${hub.country}`;
      return `${hub.radiusKm} km radius`;
    }

    function setMetroSelection(ids, label) {
      metroSelectedStartupIds = ids ? new Set(ids) : null;
      metroSelectionLabel = label || '';
    }

    function clearMetroSelectionState() {
      setMetroSelection(null, '');
    }

    function updateMetroSelectionState() {
      const active = Boolean(metroSelectedStartupIds && metroSelectedStartupIds.size);
      clearMetroSelection.disabled = !active;
      metroSelectionState.textContent = active
        ? `Cluster selected: ${metroSelectionLabel}.`
        : 'Tip: click a metro node/cluster to filter globe and sidebar.';
    }

    function projectMetroPoint(lat, lng, bounds, width, height, pad) {
      const x = pad + ((lng - bounds.minLng) / (bounds.maxLng - bounds.minLng || 1)) * (width - pad * 2);
      const y = pad + ((bounds.maxLat - lat) / (bounds.maxLat - bounds.minLat || 1)) * (height - pad * 2);
      return { x, y };
    }

    function clusterMetroPoints(points, thresholdPx) {
      const clusters = [];
      points.forEach(point => {
        let assigned = null;
        for (const c of clusters) {
          const dx = point.x - c.x;
          const dy = point.y - c.y;
          if (Math.sqrt(dx * dx + dy * dy) <= thresholdPx) {
            assigned = c;
            break;
          }
        }
        if (!assigned) {
          clusters.push({ x: point.x, y: point.y, members: [point] });
          return;
        }
        assigned.members.push(point);
        const n = assigned.members.length;
        assigned.x = (assigned.x * (n - 1) + point.x) / n;
        assigned.y = (assigned.y * (n - 1) + point.y) / n;
      });
      return clusters;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function clusterLabel(cluster) {
      if (cluster.members.length === 1) return cluster.members[0].name;
      const cityCounts = {};
      cluster.members.forEach(m => {
        cityCounts[m.city] = (cityCounts[m.city] || 0) + 1;
      });
      const topCity = Object.entries(cityCounts).sort((a, b) => b[1] - a[1])[0]?.[0];
      if (topCity && cityCounts[topCity] >= Math.ceil(cluster.members.length / 2)) {
        return `${topCity} (${cluster.members.length})`;
      }
      return `${cluster.members.length} startups`;
    }

    function renderMetroMap() {
      const hub = METRO_HUBS[metroHubSelect.value] || METRO_HUBS.paris;
      const data = metroCandidates(hub, currentBaseFilteredStartups);
      const width = metroMap.clientWidth || 280;
      const height = metroMap.clientHeight || 220;
      metroClusterMembersById = {};

      if (!data.length) {
        metroMap.innerHTML = '<div class="metro-empty">No startups in this metro under current filters.</div>';
        metroNote.textContent = `${hub.label}: 0 startups in ${metroScopeLabel(hub)}`;
        updateMetroSelectionState();
        return;
      }

      const pad = 18;
      const lats = data.map(d => d.lat);
      const lngs = data.map(d => d.lng);
      const latPadding = Math.max((Math.max(...lats) - Math.min(...lats)) * 0.35, 0.08);
      const lngPadding = Math.max((Math.max(...lngs) - Math.min(...lngs)) * 0.35, 0.08);
      const bounds = {
        minLat: Math.min(...lats) - latPadding,
        maxLat: Math.max(...lats) + latPadding,
        minLng: Math.min(...lngs) - lngPadding,
        maxLng: Math.max(...lngs) + lngPadding
      };

      const projected = data.map(d => ({
        ...d,
        ...projectMetroPoint(d.lat, d.lng, bounds, width, height, pad)
      }));
      const clusters = clusterMetroPoints(projected, 16);

      const gridLines = [0.2, 0.4, 0.6, 0.8].map(v => `
        <line x1="${Math.round(width * v)}" y1="0" x2="${Math.round(width * v)}" y2="${height}" stroke="rgba(255,255,255,0.05)" />
        <line x1="0" y1="${Math.round(height * v)}" x2="${width}" y2="${Math.round(height * v)}" stroke="rgba(255,255,255,0.05)" />
      `).join('');

      const nodes = clusters.map((cluster, index) => {
        const clusterId = `cluster_${index}`;
        metroClusterMembersById[clusterId] = cluster.members.map(m => m.startup_id);
        const size = cluster.members.length;
        const r = 4 + Math.min(size, 8);
        const lead = cluster.members[0];
        const label = clusterLabel(cluster);
        const tooltip = size === 1
          ? `${lead.name} | ${lead.city}`
          : `${size} startups | ${cluster.members.slice(0, 4).map(m => m.name).join(', ')}${size > 4 ? ', ...' : ''}`;
        const isSelected = Boolean(
          metroSelectedStartupIds
          && metroSelectedStartupIds.size === cluster.members.length
          && cluster.members.every(m => metroSelectedStartupIds.has(m.startup_id))
        );
        const stroke = isSelected ? '#ffffff' : 'rgba(255,255,255,0.85)';
        const strokeWidth = isSelected ? 2.2 : 1;
        return `
          <g>
            <circle data-cluster-id="${clusterId}" cx="${cluster.x.toFixed(1)}" cy="${cluster.y.toFixed(1)}" r="${r}" fill="${lead.color}" fill-opacity="0.85" stroke="${stroke}" stroke-width="${strokeWidth}" style="cursor:pointer"></circle>
            <text data-cluster-id="${clusterId}" x="${(cluster.x + r + 3).toFixed(1)}" y="${(cluster.y - r - 2).toFixed(1)}" fill="#dfefff" font-size="10" style="cursor:pointer">${escapeHtml(label)}</text>
            <title>${escapeHtml(tooltip)}</title>
          </g>
        `;
      }).join('');

      metroMap.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(hub.label)} metro startup map">
          <rect x="0" y="0" width="${width}" height="${height}" fill="transparent"></rect>
          ${gridLines}
          <circle cx="${width / 2}" cy="${height / 2}" r="${Math.min(width, height) * 0.42}" fill="none" stroke="rgba(0,194,168,0.22)" stroke-width="1.2"></circle>
          ${nodes}
        </svg>
      `;
      metroNote.textContent = `${hub.label}: ${data.length} startups in ${metroScopeLabel(hub)}, clustered for readability`;
      updateMetroSelectionState();
    }

    function partnershipEdges(data) {
      return data.flatMap(s => (partnershipByCompany[s.name] || []).map(partner => ({
        company: s.name,
        partner
      })));
    }

    function renderPartnershipPanel(data) {
      const edges = partnershipEdges(data);
      if (!edges.length) {
        partnershipCard.innerHTML = '<small>No mapped partnerships in current scope.</small>';
        partnershipGraph.innerHTML = '';
        return;
      }

      const partnerCounts = {};
      edges.forEach(e => {
        partnerCounts[e.partner] = (partnerCounts[e.partner] || 0) + 1;
      });
      const topPartners = Object.entries(partnerCounts)
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .slice(0, 5);

      partnershipCard.innerHTML = `
        <b>Mapped edges:</b> ${edges.length}<br/>
        <b>Unique partners:</b> ${Object.keys(partnerCounts).length}<br/>
        <b>Top partners:</b> ${topPartners.map(([k, v]) => `${k} (${v})`).join(', ')}
      `;

      const topEdgeList = edges
        .map(e => `${e.company}__${e.partner}`)
        .reduce((acc, key) => {
          acc[key] = (acc[key] || 0) + 1;
          return acc;
        }, {});
      const topEdges = Object.entries(topEdgeList)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 6)
        .map(([k]) => {
          const [company, partner] = k.split('__');
          return { company, partner };
        });

      const leftX = 20;
      const rightX = 260;
      const rowGap = 24;
      const startY = 18;
      const nodes = topEdges.map((e, i) => ({ ...e, y: startY + i * rowGap }));

      const links = nodes.map(n => `<line x1="${leftX + 70}" y1="${n.y}" x2="${rightX - 70}" y2="${n.y}" stroke="rgba(0,194,168,0.45)" stroke-width="1.4"></line>`).join('');
      const leftLabels = nodes.map(n => `<text x="${leftX}" y="${n.y + 4}" fill="#dfefff" font-size="10">${escapeHtml(n.company.slice(0, 18))}</text>`).join('');
      const rightLabels = nodes.map(n => `<text x="${rightX - 68}" y="${n.y + 4}" fill="#9fe9ff" font-size="10">${escapeHtml(n.partner.slice(0, 18))}</text>`).join('');
      partnershipGraph.innerHTML = `
        <rect x="0" y="0" width="280" height="170" fill="transparent"></rect>
        ${links}
        ${leftLabels}
        ${rightLabels}
      `;
    }

    function pct(value, total) {
      if (!total) return '0%';
      return `${Math.round((value / total) * 100)}%`;
    }

    function renderQualityPanel(data) {
      const total = data.length;
      if (!total) {
        qualityCard.innerHTML = '<small>No data in scope.</small>';
        return;
      }
      const fundingKnown = data.filter(s => s.funding && s.funding !== 'Undisclosed').length;
      const foundedKnown = data.filter(s => Number.isInteger(s.founded_year)).length;
      const lifecycleKnown = data.filter(s => s.lifecycle_status).length;
      const lifecycleExplicit = data.filter(s => s.lifecycle_effective_date || s.lifecycle_note).length;
      const maturityKnown = data.filter(s => s.maturity_stage).length;
      const maturityExplicit = data.filter(s => Boolean(maturityByCompany[s.name])).length;
      const partnerMapped = data.filter(s => (partnershipByCompany[s.name] || []).length > 0).length;
      const websiteKnown = data.filter(s => Boolean(s.website)).length;
      const geoKnown = data.filter(s => Number.isFinite(s.lat) && Number.isFinite(s.lng)).length;
      const staleCandidates = data.filter(s => !Number.isInteger(s.founded_year) && (!s.funding || s.funding === 'Undisclosed')).length;

      const identityMap = {};
      data.forEach(s => {
        const key = normalizedName(s.name);
        identityMap[key] = identityMap[key] || new Set();
        identityMap[key].add(`${s.city}|${s.country}`);
      });
      const potentialConflicts = Object.values(identityMap).filter(set => set.size > 1).length;

      qualityCard.innerHTML = `
        <b>Funding coverage:</b> ${fundingKnown}/${total} (${pct(fundingKnown, total)})<br/>
        <b>Founded-year coverage:</b> ${foundedKnown}/${total} (${pct(foundedKnown, total)})<br/>
        <b>Lifecycle coverage:</b> ${lifecycleKnown}/${total} (${pct(lifecycleKnown, total)}) | explicit: ${lifecycleExplicit}<br/>
        <b>Maturity coverage:</b> ${maturityKnown}/${total} (${pct(maturityKnown, total)}) | explicit: ${maturityExplicit}<br/>
        <b>Partnership coverage:</b> ${partnerMapped}/${total} (${pct(partnerMapped, total)})<br/>
        <b>Website/Geo completeness:</b> ${pct(websiteKnown, total)} / ${pct(geoKnown, total)}<br/>
        <b>Stale candidates:</b> ${staleCandidates}<br/>
        <b>Potential identity conflicts:</b> ${potentialConflicts}
      `;
    }

    function renderComparisonCard(countryRows) {
      if (countryRows.length < 2) {
        comparisonCard.innerHTML = '<small>Add broader filters to compare at least two countries.</small>';
        return;
      }
      const countryA = countryRows.find(r => r.name === compareCountryA.value);
      const countryB = countryRows.find(r => r.name === compareCountryB.value);
      if (!countryA || !countryB) {
        comparisonCard.innerHTML = '<small>Select countries to compare.</small>';
        return;
      }

      const countDelta = countryA.count - countryB.count;
      const leader = countDelta === 0
        ? 'Tie'
        : `${countDelta > 0 ? countryA.name : countryB.name} leads by ${Math.abs(countDelta)}`;
      const countryARecentPct = countryA.foundedKnown
        ? Math.round((countryA.recentFounded / countryA.foundedKnown) * 100)
        : null;
      const countryBRecentPct = countryB.foundedKnown
        ? Math.round((countryB.recentFounded / countryB.foundedKnown) * 100)
        : null;
      const countryAMedianYear = medianYear(countryA.foundedYears);
      const countryBMedianYear = medianYear(countryB.foundedYears);

      comparisonCard.innerHTML = `
        <b>${countryA.name}</b>: ${countryA.count} startups<br/>
        <small>Top specialties: ${topSpecialtiesLabel(countryA.specialties)} | Funding disclosed: ${countryA.fundingKnown}/${countryA.count}</small><br/><br/>
        <small>Founded coverage: ${countryA.foundedKnown}/${countryA.count} | 2020+ share: ${countryARecentPct === null ? 'n/a' : `${countryARecentPct}%`} | Median year: ${countryAMedianYear || 'n/a'}</small><br/><br/>
        <b>${countryB.name}</b>: ${countryB.count} startups<br/>
        <small>Top specialties: ${topSpecialtiesLabel(countryB.specialties)} | Funding disclosed: ${countryB.fundingKnown}/${countryB.count}</small><br/><br/>
        <small>Founded coverage: ${countryB.foundedKnown}/${countryB.count} | 2020+ share: ${countryBRecentPct === null ? 'n/a' : `${countryBRecentPct}%`} | Median year: ${countryBMedianYear || 'n/a'}</small><br/><br/>
        <b>Result:</b> ${leader}
      `;
    }

    function updateDrilldownPanels() {
      if (!currentFilteredStartups.length) {
        drilldownStats.innerHTML = '<small>No startups match current filters.</small>';
        comparisonCard.innerHTML = '<small>No comparison available.</small>';
        compareCountryA.innerHTML = '';
        compareCountryB.innerHTML = '';
        renderMetroMap();
        return;
      }

      const activeRegion = currentActiveRegion();
      const scoped = activeRegion
        ? currentFilteredStartups.filter(s => s.region === activeRegion)
        : currentFilteredStartups;
      const countryRows = aggregateCountryStats(scoped);

      const topCountries = countryRows
        .slice(0, 5)
        .map(row => `${row.name} (${row.count})`)
        .join(', ') || 'None';
      const regionLabel = activeRegion || 'All regions';
      const trend = foundedTrendBuckets(scoped);
      const foundedKnownTotal = scoped.filter(s => Number.isInteger(s.founded_year)).length;

      drilldownStats.innerHTML = `
        <b>Scope:</b> ${regionLabel}<br/>
        <b>Startups in scope:</b> ${scoped.length}<br/>
        <b>Countries in scope:</b> ${countryRows.length}<br/>
        <b>Top countries:</b> ${topCountries}<br/>
        <b>Founded-year coverage:</b> ${foundedKnownTotal}/${scoped.length}<br/>
        <b>Trend:</b> Pre-2015 (${trend['Pre-2015']}), 2015-2019 (${trend['2015-2019']}), 2020+ (${trend['2020+']}), Unknown (${trend.Unknown})
      `;

      setCountryOptions(countryRows.map(r => r.name));
      renderComparisonCard(countryRows);
      renderMetroMap();
    }

    function colorFor(startup) {
      if (startup.specialty.includes('hardware')) return colorBySpecialty.hardware;
      if (startup.specialty.includes('software')) return colorBySpecialty.software;
      if (startup.specialty.includes('cryptography')) return colorBySpecialty.cryptography;
      if (startup.specialty.includes('sensing')) return colorBySpecialty.sensing;
      return colorBySpecialty.materials;
    }

    function applyFilters() {
      const region = regionFilter.value;
      const specialty = specialtyFilter.value;
      const lifecycle = lifecycleFilter.value;
      const maturity = maturityFilter.value;
      const query = searchInput.value.trim().toLowerCase();

      const baseFiltered = STARTUPS.filter(s => {
        const lifecycleObj = lifecycleForStartup(s);
        const maturityStage = maturityForStartup(s);
        const regionOk = region === 'all' || s.region === region;
        const specialtyOk = specialty === 'all' || s.specialty.includes(specialty);
        const lifecycleOk = lifecycle === 'all' || lifecycleObj.status === lifecycle;
        const maturityOk = maturity === 'all' || maturityStage === maturity;
        const searchOk = !query || s.name.toLowerCase().includes(query);
        return regionOk && specialtyOk && lifecycleOk && maturityOk && searchOk;
      }).map(s => ({
        ...s,
        lifecycle: lifecycleForStartup(s),
        maturity_stage: maturityForStartup(s),
      })).map(s => ({
        ...s,
        startup_id: makeStartupId(s),
        color: colorFor(s),
        funding: s.funding || fundingByCompany[s.name] || 'Undisclosed',
        founded_year: foundedYearFromStartup(s),
        lifecycle_status: s.lifecycle.status,
        lifecycle_effective_date: s.lifecycle.effective_date || '',
        lifecycle_note: s.lifecycle.note || ''
      }));

      currentBaseFilteredStartups = baseFiltered;
      let filtered = baseFiltered;
      if (metroSelectedStartupIds && metroSelectedStartupIds.size) {
        const metroFiltered = baseFiltered.filter(s => metroSelectedStartupIds.has(s.startup_id));
        if (metroFiltered.length) {
          filtered = metroFiltered;
        } else {
          clearMetroSelectionState();
        }
      }

      currentFilteredStartups = filtered;
      world.pointsData(filtered);
      updatePointEmphasis();
      if (!currentHoveredRegion()) {
        syncHoverState();
      } else {
        updateDrilldownPanels();
      }

      const byRegion = filtered.reduce((acc, s) => {
        acc[s.region] = (acc[s.region] || 0) + 1;
        return acc;
      }, {});

      stats.innerHTML = `
        <b>Total displayed:</b> ${filtered.length} / ${STARTUPS.length}<br/>
        <b>Regions shown:</b> ${Object.keys(byRegion).length}<br/>
        <b>Breakdown:</b> ${Object.entries(byRegion).map(([k,v]) => `${k} (${v})`).join(', ') || 'None'}<br/>
        <b>Metro cluster filter:</b> ${metroSelectedStartupIds && metroSelectedStartupIds.size ? metroSelectionLabel : 'None'}
      `;
      renderPartnershipPanel(filtered);
      renderQualityPanel(filtered);
      syncUrlWithCurrentState();
    }

    regionFilter.addEventListener('change', applyFilters);
    specialtyFilter.addEventListener('change', applyFilters);
    lifecycleFilter.addEventListener('change', applyFilters);
    maturityFilter.addEventListener('change', applyFilters);
    searchInput.addEventListener('input', applyFilters);
    drillDownToggle.addEventListener('change', syncHoverState);
    compareCountryA.addEventListener('change', updateDrilldownPanels);
    compareCountryB.addEventListener('change', updateDrilldownPanels);
    saveViewBtn.addEventListener('click', saveCurrentView);
    copyLinkBtn.addEventListener('click', copyShareLink);
    savedViewsSelect.addEventListener('change', () => loadSavedViewById(savedViewsSelect.value));
    metroHubSelect.addEventListener('change', () => {
      clearMetroSelectionState();
      applyFilters();
    });
    clearMetroSelection.addEventListener('click', () => {
      clearMetroSelectionState();
      applyFilters();
    });
    metroMap.addEventListener('click', event => {
      const target = event.target.closest('[data-cluster-id]');
      if (!target) return;
      const clusterId = target.getAttribute('data-cluster-id');
      const startupIds = metroClusterMembersById[clusterId];
      if (!startupIds || !startupIds.length) return;
      const count = startupIds.length;
      const hubLabel = (METRO_HUBS[metroHubSelect.value] || METRO_HUBS.paris).label;
      const label = count === 1
        ? `1 startup in ${hubLabel}`
        : `${count} startups in ${hubLabel}`;
      setMetroSelection(startupIds, label);
      applyFilters();
    });
    const globeEl = document.getElementById('globe');
    globeEl.addEventListener('mouseenter', () => {
      pointerInsideGlobe = true;
      world.controls().autoRotate = false;
    });
    globeEl.addEventListener('mouseleave', () => {
      pointerInsideGlobe = false;
      syncHoverState();
    });
    window.addEventListener('resize', () => {
      world.width(document.getElementById('globe').clientWidth);
      world.height(document.getElementById('globe').clientHeight);
      renderMetroMap();
    });

    loadCountryBorders().catch(err => {
      console.error('Failed to load country borders:', err);
    });
    renderSavedViewsOptions();
    applyFilters();
    loadStateFromUrlIfPresent();
  </script>
</body>
</html>
