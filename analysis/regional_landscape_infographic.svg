<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1800" viewBox="0 0 1400 1800" role="img" aria-labelledby="title desc">
  <title id="title">Quantum Startups Regional Landscape Infographic</title>
  <desc id="desc">Startup counts by continent, top countries, and top cities from a 55-startup dataset snapshot dated March 20, 2026.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <style>
      .title { font: 700 52px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 400 24px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .meta { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .card { fill: #ffffff; stroke: #dbe7ff; stroke-width: 2; }
      .kpi-label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #64748b; letter-spacing: 1px; }
      .kpi-num { font: 700 68px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .row-label { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .row-num { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .th { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .td { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .note { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .footer { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
    </style>
