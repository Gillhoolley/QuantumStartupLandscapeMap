<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Quantum Startups Regional Landscape Infographic</title>
  <desc id="desc">Startup counts by continent from a 100-startup dataset snapshot dated March 23, 2026.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
  </defs>
  <style>
    .title{font:700 34px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
    .meta{font:500 15px 'Segoe UI',Arial,sans-serif;fill:#475569}
    .kpi-label{font:600 12px 'Segoe UI',Arial,sans-serif;fill:#64748b;letter-spacing:1px}
    .kpi-value{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
    .label{font:600 16px 'Segoe UI',Arial,sans-serif;fill:#0f172a}
    .value{font:700 16px 'Segoe UI',Arial,sans-serif;fill:#0f172a;text-anchor:end}
    .card{fill:#fff;stroke:#dbe7ff;stroke-width:1}
  </style>
  <rect x="0" y="0" width="900" height="620" fill="url(#bg)"/>
  <text class="title" x="70" y="78">Quantum Startups Regional Landscape</text>
  <text class="meta" x="70" y="110">Dataset size: 100 startups | Snapshot date: March 23, 2026</text>
  <rect class="card" x="70" y="136" width="220" height="92" rx="14"/>
